<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Registradora</title>
</head>
<body>
    <h1>Caixa Registradora</h1>

    <p>
        <label for="inPreco">Preço Un.: R$</label>
        <input type="number" id="inPreco" min="0" step="0.01" placeholder="0,00">
    </p>

    <p>
        <label for="inQuantidade">Quantidade:</label>
        <input type="number" id="inQuantidade" min="1" step="1" placeholder="1">
    </p>

    <p>
        <button id="btRegistrar">Registrar</button>
        <button id="btReiniciar" type="button">Reiniciar</button>
    </p>

    <h2 id="outTotal">Total: R$ 0,00</h2>

    <script src="script.js"></script>
</body>
</html>
