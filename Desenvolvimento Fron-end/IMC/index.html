<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
</head>
<body>
    <label>Peso em quilogramas:</label><br>
    <input type="number" id="peso"><br><br>

    <label>Altura em metros:</label><br>
    <input type="number" id="altura" step="0.01"><br><br>

    <button onclick="calcular()">Calcular IMC</button>

    <h3 id="resultado"></h3>

    <script>
        function calcular() {
            let peso = Number(document.getElementById("peso").value)
            let altura = Number(document.getElementById("altura").value)

            let imc = peso / (altura * altura)

            document.getElementById("resultado").innerHTML =
                "O IMC calculado é: " + imc.toFixed(2)
        }
    </script>
</body>
</html>
