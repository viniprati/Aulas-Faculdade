<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Partida de Futebol</title>
</head>
<body>
    <main>
        <h1>Resultado de Partida de Futebol</h1>
        <h2>Informe a quantidade de gols de cada time:</h2>

        <div class="campo">
            <label for="timeA">Time A:</label>
            <input type="number" id="timeA" min="0">
        </div>

        <div class="campo">
            <label for="timeB">Time B:</label>
            <input type="number" id="timeB" min="0">
        </div>

        <button id="btnResultado" type="button">Resultado</button>

        <p id="resultado"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
